<!DOCTYPE html>
<html class="wide wow-animation" lang="en">

<head>
  <!-- Site Title-->
  <title>About</title>

  <!-- Stylesheets-->
  <link rel="stylesheet" type="text/css"
    href="//fonts.googleapis.com/css?family=Roboto+Mono:300,300italic,400,700%7CArvo:400,700">
  <link rel="stylesheet" href="assets/fonts/telma/css/telma.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/custom.css">
  <script>
    (function () {
      var lang = localStorage.getItem('siteLang') || 'en';
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      document.write('<style id="anti-flash">body{opacity:0!important;}</style>');
    })();
  </script>
</head>

<body>
  <div class="page">
    <main class="page-content" id="perspective">
      <div class="content-wrapper">
        <div id="page-header"> </div>
        <div id="wrapper">
          <div class="page-title">
            <div class="page-title-content">
              <div class="shell">
                <p class="page-title-header" data-i18n="nav.about"></p>
              </div>
            </div>
          </div>
          <section class="section-xl bg-white text-center text-md-left">
            <div class="shell-fluid shell-condensed">
              <div class="range range-md-reverse range-xs-middle range-md-right range-50">
                <div class="cell-md-5 cell-lg-3 cell-lg-preffix-1">
                  <div class="inset-horizontal-15">
                    <h2 data-i18n="whoWeAre.title"></h2>

                    <p class="large">
                      <span data-i18n="whoWeAre.description"></span>
                    </p>
                  </div>
                </div>
                <div class="cell-md-7 cell-lg-6">
                  <div class="row row-gutter-custom range-15">
                    <div class="col-xs-4">
                      <figure class="figure-fullwidth">
                        <img data-i18n="whoWeAre.src1" data-i18n-attr="src" alt="" width="300" height="460" />
                      </figure>
                    </div>
                    <div class="col-xs-4">
                      <figure class="figure-fullwidth">
                        <img data-i18n="whoWeAre.src2" data-i18n-attr="src" alt="" width="300" height="460" />
                      </figure>
                    </div>
                    <div class="col-xs-4">
                      <figure class="figure-fullwidth">
                        <img data-i18n="whoWeAre.src3" data-i18n-attr="src" alt="" width="300" height="460" />
                      </figure>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <footer class="page-footer page-footer-default" id="footer-placeholder"></footer>

        </div>
        <div id="perspective-content-overlay"></div>
      </div>
      <!-- RD Navbar-->
      <div class="rd-navbar-wrap" id="rdNavBar"></div>

    </main>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/core.min.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/translation.js"></script>
</body>

</html>
