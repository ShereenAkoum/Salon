<!DOCTYPE html>
<html class="wide wow-animation" lang="en" dir="ltr">

<head>
  <!-- Site Title-->
  <title>Home</title>

  <!-- Stylesheets-->
  <link rel="stylesheet" type="text/css"
    href="//fonts.googleapis.com/css?family=Roboto+Mono:300,300italic,400,700%7CArvo:400,700">
  <link rel="stylesheet" href="assets/fonts/telma/css/telma.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/custom.css">

  <script>
    (function () {
      var lang = localStorage.getItem('siteLang') || 'en';
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      document.write('<style id="anti-flash">body{opacity:0!important;}</style>');
    })();
  </script>
</head>

<body>
  <div class="page">
    <header class="page-header">
      <div class="rd-navbar-wrap">
        <nav class="rd-navbar" data-layout="rd-navbar-fixed" data-sm-layout="rd-navbar-fixed"
          data-sm-device-layout="rd-navbar-fixed" data-md-layout="rd-navbar-fullwidth"
          data-md-device-layout="rd-navbar-fixed" data-lg-device-layout="rd-navbar-fixed"
          data-lg-layout="rd-navbar-fullwidth" data-stick-up-clone="true" data-md-stick-up-offset="140px"
          data-lg-stick-up-offset="140px">
          <div class="rd-navbar-inner">
            <div class="rd-navbar-panel">
              <button class="rd-navbar-toggle" data-rd-navbar-toggle=".rd-navbar-nav-wrap">
                <span></span>
              </button>
              <div class="rd-navbar-brand">
                <a class="brand-name" href="index.html">
                  <div class="brand-mobile">
                    <div class="logo-name">
                      <span class="logo-glow">Glow</span>
                      <span class="logo-and">&</span>
                      <span class="logo-glam">Glam</span>
                      <span class="logo-by">by Sara</span>
                    </div>
                  </div>
                  <div class="brand-desktop">
                    <img src="assets/images/logo.jpeg" alt="" width="125" height="100" />
                  </div>
                </a>
              </div>
            </div>
            <div class="rd-navbar-nav-wrap">
              <div class="rd-navbar-nav-inner">
                <ul class="rd-navbar-nav">
                  <li class="active">
                    <a href="index.html" data-i18n="nav.home">Home</a>
                  </li>
                  <li>
                    <a href="services.html" data-i18n="nav.services">Services</a>
                  </li>
                  <li>
                    <a href="about.html" data-i18n="nav.about">About</a>
                  </li>
                  <li>
                    <a href="faq.html" data-i18n="nav.faq">FAQ</a>
                  </li>
                  <li>
                    <a href="#contacts" data-i18n="nav.contacts">Contacts</a>
                  </li>
                  <li class="lang-item" id="langToggle">
                    <a href="javascript:void(0)" class="lang-switcher" aria-label="Switch language">
                      <span class="lang-icon">文A</span>
                      <span class="lang-label">العربية</span>
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <section class="jumbotron-custom jumbotron-custom-3 bg-white bg-image bg-image-custom bg-image-center"
      style="background-image: url(assets/images/home-three-1-1920x800.jpg);">
      <div class="jumbotron-custom-content text-center">
        <div class="shell">
          <div class="range range-sm-center">
            <div class="cell-sm-9 cell-md-8 cell-lg-7">
              <h1 style="line-height: 80px;" data-i18n="mainSection.title"></h1>
              <p class="large">
                <span data-i18n="mainSection.description"></span>
              </p>
              <a class="btn btn-style-1 btn-primary" href="services.html" data-i18n="common.bookNow"></a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Vouchers Section -->
    <section id="vouchers" class="section-xl bg-white text-center">
      <div class="shell">
        <h1 data-i18n="voucher.title"></h1>
        <p class="big" data-i18n="voucher.description"></p>
        <div id="vouchers-grid" class="vouchers-grid"></div>
      </div>
    </section>

    <section class="section-xl bg-periglacial-blue text-center text-md-left">
      <div class="shell-fluid shell-condensed">
        <div class="range range-md-reverse range-xs-middle range-md-right range-50">
          <div class="cell-md-5 cell-lg-4">
            <div class="inset-1">
              <h1 data-i18n="whoWeAre.title"></h1>
              <p class="large">
                <span data-i18n="whoWeAre.description"></span>
              </p>
              <a class="btn btn-sm btn-style-1 btn-primary" href="about.html" data-i18n="common.readMorebutton"></a>
            </div>
          </div>
          <div class="cell-md-7 cell-lg-6">
            <div class="row row-gutter-custom range-15">
              <div class="col-xs-4">
                <figure class="figure-fullwidth">
                  <img data-i18n="whoWeAre.src1" data-i18n-attr="src" alt="" width="300" height="460" />
                </figure>
              </div>
              <div class="col-xs-4">
                <figure class="figure-fullwidth">
                  <img data-i18n="whoWeAre.src2" data-i18n-attr="src" alt="" width="300" height="460" />
                </figure>
              </div>
              <div class="col-xs-4">
                <figure class="figure-fullwidth">
                  <img data-i18n="whoWeAre.src3" data-i18n-attr="src" alt="" width="300" height="460" />
                </figure>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="ourServices" class="bg-image"
      style="background-image: url(assets/images/services-banner.png); background-repeat: no-repeat; background-position: center;background-size: cover;">
      <div class="shell-fluid shell-condensed">
        <div class="range range-condensed">
          <div class="cell-md-6 cell-md-6-mod-1 image-wrap-left white-border">
            <div class="image-wrap-inner">
              <h1 data-i18n="ourServices.title"></h1>
              <p class="big">
                <span data-i18n="ourServices.description"></span>
              </p>
              <a class="btn btn-style-1 btn-primary" href="services.html" data-i18n="common.readMorebutton"></a>
            </div>
          </div>
          <div class="cell-md-6 cell-md-6-mod-2 image-wrap-right">
            <div class="ourServicesP2 image-wrap-inner">
              <div class="range range-condensed range-inner-bordered" id="services-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="contacts" class="section-xl bg-image text-center"
      style="background-image: url(assets/images/bg-image-1.jpg);">
      <div class="box-wrap-content">
        <div class="shell">
          <div class="range">
            <div class="cell-xs-12">
              <div class="box-contacts box-contacts-horizontal box-wrap-content-interactive block-auto">
                <div class="box-contacts-col">
                  <div class="box-contacts-block">
                    <h3 data-i18n="contactSection.title"></h3>
                    <p data-i18n="contactSection.description"></p>
                    <p class="phone-number">
                      <!-- <a href="tel:+1234567890" data-i18n="common.phone"></a> -->
                      <a data-i18n="common.phone" data-i18n-attr="href-tel:"></a>
                    </p>
                    <form class="rd-mailform" action="https://formspree.io/f/xdaylqjz" method="POST">
                      <div class="form-group">
                        <label class="form-label-outside" for="contact-full-name"
                          data-i18n="contactSection.namePlaceholder"></label>
                        <input class="form-control" id="contact-full-name" type="text" name="name"
                          data-constraints="@Required">
                      </div>
                      <div class="form-group">
                        <label class="form-label-outside" for="contact-phone"
                          data-i18n="contactSection.phonePlaceholder"></label>
                        <input class="form-control" id="contact-phone" type="text" name="phone"
                          data-constraints="@Required @Numeric">
                      </div>
                      <button class="btn btn-sm btn-primary btn-block btn-circle" type="submit"
                        data-i18n="common.submitButton"></button>
                    </form>
                  </div>
                </div>
                <div class="box-contacts-col box-contacts-right">
                  <div class="box-contacts-block">
                    <h3 data-i18n="openingHours.title"></h3>
                    <dl class="box-contacts-terms-list">
                      <dt data-i18n="openingHours.days.label-1"></dt>
                      <dd data-i18n="openingHours.days.hours-1"></dd>
                      <dt data-i18n="openingHours.days.label-2"></dt>
                      <dd data-i18n="openingHours.days.hours-2"></dd>
                    </dl>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="page-footer page-footer-default" id="footer-placeholder"></footer>

  </div>

  <script src="assets/js/main.js"></script>

  <script src="assets/js/core.min.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/steps.js"></script>
  <script src="assets/js/contacts.js"></script>
  <script src="assets/js/translation.js"></script>
</body>

</html>
