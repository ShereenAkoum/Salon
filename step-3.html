<!DOCTYPE html>
<html class="wide wow-animation" lang="en">

<head>
  <title>Checkout</title>

  <!-- Stylesheets-->
  <link rel="stylesheet" type="text/css"
    href="//fonts.googleapis.com/css?family=Roboto+Mono:300,300italic,400,700%7CArvo:400,700">
  <link rel="stylesheet" href="assets/fonts/telma/css/telma.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/custom.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap">
  <script>
    (function () {
      var lang = localStorage.getItem('siteLang') || 'en';
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      document.write('<style id="anti-flash">body{opacity:0!important;}</style>');
    })();
  </script>
</head>

<body class="one-screen-page">
  <div class="page">
    <main class="page-content" id="perspective">
      <div class="content-wrapper">
        <div id="page-header"></div>

        <div class="custom-progress">
          <div class="custom-progress-body" style="width: 100%;"></div>
        </div>
        <div id="wrapper">
          <section class="section-xs bg-periglacial-blue one-screen-page-content text-center">
            <div class="shell"><a class="link link-primary link-return" href="javascript:void(0);"
                onclick="window.location.href = buildBackLink('step-3')">Back</a>
            </div>
            <div class="shell">
              <h2>ONE MORE STEP!</h2>
              <div class="p text-width-medium">
                <p class="big">To complete your appointment, please review all details described below. Don’t forget to
                  provide your name and phone and telephone so that we could contact you.</p>
              </div>
              <div
                class="box-contacts box-contacts-vertical box-contacts-vertical-small box-wrap-content-interactive block-centered">
                <div class="box-contacts-col">
                  <div class="box-contacts-block">
                    <h3>Service:</h3>
                    <p>-</p>
                  </div>
                  <div class="box-contacts-block">
                    <h3>Date:</h3>
                    <p>-</p>
                  </div>
                </div>
                <div class="box-contacts-col box-contacts-right">
                  <div class="box-contacts-block">
                    <form action="https://formspree.io/f/mwvwzrgy" method="POST">
                      <input type="hidden" name="service">
                      <input type="hidden" name="date">

                      <div class="form-group">
                        <label class="form-label-outside" for="contact-full-name">Full Name</label>
                        <input class="form-control" id="contact-full-name" type="text" name="name"
                          data-constraints="@Required">
                      </div>
                      <div class="form-group">
                        <label class="form-label-outside" for="contact-phone">Telephone</label>
                        <input class="form-control" id="contact-phone" type="text" name="phone"
                          data-constraints="@Required @Numeric">
                      </div>
                      <button class="btn btn-sm btn-primary btn-block btn-circle" type="submit" disabled>Book
                        now</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- Page Footer-->
          <footer class="page-footer page-footer-default" id="footer-placeholder"></footer>

        </div>
        <div id="perspective-content-overlay"></div>
      </div>
      <!-- RD Navbar-->
      <div class="rd-navbar-wrap" id="rdNavBar"></div>

    </main>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/core.min.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/steps.js"></script>
  <script src="assets/js/translation.js"></script>

</body>

</html>
