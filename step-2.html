<!DOCTYPE html>
<html class="wide wow-animation" lang="en">

<head>
  <title>Choose Date</title>

  <!-- Stylesheets-->
  <link rel="stylesheet" type="text/css"
    href="//fonts.googleapis.com/css?family=Roboto+Mono:300,300italic,400,700%7CArvo:400,700">
  <link rel="stylesheet" href="assets/fonts/telma/css/telma.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/custom.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap">
  <script>
    (function () {
      var lang = localStorage.getItem('siteLang') || 'en';
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      document.write('<style id="anti-flash">body{opacity:0!important;}</style>');
    })();
  </script>
</head>

<body class="one-screen-page">
  <div class="page">
    <main class="page-content" id="perspective">
      <div class="content-wrapper">
        <div id="page-header"></div>
        <div class="custom-progress">
          <div class="custom-progress-body" style="width: 66.66%;"></div>
        </div>
        <div id="wrapper">
          <section class="section-xs bg-periglacial-blue one-screen-page-content text-center">
            <div class="shell">
              <a id="step2-back" class="link link-primary link-return" href="javascript:void(0);"
                onclick="window.location.href = buildBackLink('step-2')">Back</a>
            </div>
            <div class="shell">
              <h2 id="step2-title">Choose a Date</h2>
              <div class="p text-width-medium">
                <p class="big" id="step2-desc"></p>
              </div>
              <!-- Dynamically generated by step2.js -->
              <div id="date-picker-container"></div>
            </div>
          </section>

          <!-- Page Footer-->
          <footer class="page-footer page-footer-default" id="footer-placeholder"></footer>

        </div>
        <div id="perspective-content-overlay"></div>
      </div>
      <!-- RD Navbar-->
      <div class="rd-navbar-wrap" id="rdNavBar"></div>
    </main>
  </div>
  <div class="snackbars" id="form-output-global"></div>
  <div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="pswp__bg"></div>
    <div class="pswp__scroll-wrap">
      <div class="pswp__container">
        <div class="pswp__item"></div>
        <div class="pswp__item"></div>
        <div class="pswp__item"></div>
      </div>
      <div class="pswp__ui pswp__ui--hidden">
        <div class="pswp__top-bar">
          <div class="pswp__counter"></div>
          <button class="pswp__button pswp__button--close" title="Close (Esc)"></button>
          <button class="pswp__button pswp__button--share" title="Share"></button>
          <button class="pswp__button pswp__button--fs" title="Toggle fullscreen"></button>
          <button class="pswp__button pswp__button--zoom" title="Zoom in/out"></button>
          <div class="pswp__preloader">
            <div class="pswp__preloader__icn">
              <div class="pswp__preloader__cut">
                <div class="pswp__preloader__donut"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="pswp__share-modal pswp__share-modal--hidden pswp__single-tap">
          <div class="pswp__share-tooltip"></div>
        </div>
        <button class="pswp__button pswp__button--arrow--left" title="Previous (arrow left)"></button>
        <button class="pswp__button pswp__button--arrow--right" title="Next (arrow right)"></button>
        <div class="pswp__caption">
          <div class="pswp__caption__cent"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/core.min.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/steps.js"></script>
  <script src="assets/js/step2.js"></script>
  <script src="assets/js/translation.js"></script>

</body>

</html>
